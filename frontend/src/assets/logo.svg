<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Abstract synthesis mark: two crossing curves with node dots -->
  <g id="mark">
    <!-- Primary curve — top-left to bottom-right -->
    <path d="M6 12 C16 12, 20 36, 36 36" stroke="#3170e3" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Secondary curve — top-right to bottom-left -->
    <path d="M36 12 C26 12, 22 36, 6 36" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Intersection node -->
    <circle cx="21" cy="24" r="3" fill="#f59e0b"/>
    <!-- End nodes -->
    <circle cx="6" cy="12" r="2.5" fill="#3170e3"/>
    <circle cx="36" cy="36" r="2.5" fill="#3170e3"/>
    <circle cx="36" cy="12" r="2.5" fill="#34d399"/>
    <circle cx="6" cy="36" r="2.5" fill="#34d399"/>
  </g>
  <!-- Wordmark -->
  <text x="48" y="34" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="28" letter-spacing="-1" fill="currentColor">
    Zxynth
  </text>
</svg>
